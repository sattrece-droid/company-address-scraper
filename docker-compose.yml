version: '3.8'

services:
  backend:
    build: ./backend
    container_name: company-scraper-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - ENVIRONMENT=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_ADSENSE_ID: ${NEXT_PUBLIC_ADSENSE_ID:-}
    container_name: company-scraper-frontend
    restart: unless-stopped
    environment:
      - INTERNAL_API_URL=http://backend:8000
      - BACKEND_API_KEY=${API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
